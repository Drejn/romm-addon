user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    # upstream backend (RomM app)
    upstream romm_backend {
        server 127.0.0.1:8998;
    }

    # server principale che gestisce le API e le richieste dell'app
    server {
        listen       0.0.0.0:8998;
        server_name  localhost;

        # eventuali header utili
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # location per le API dell'app (proxy pass generico)
        location / {
            proxy_pass http://romm_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # location interna per la subrequest di mod_zip
        # questa location è interna e non richiede cookie/CSRF
        location = /decode_internal {
            internal;
            proxy_pass http://romm_backend/decode;   # o /decode_internal se il backend lo espone
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # non inoltrare cookie/session per la subrequest interna
            proxy_set_header Cookie "";
            proxy_buffering off;
        }

        # (opzionale) se vuoi intercettare /decode e fornirla senza cookie
        # attenzione: usare solo se necessario e se capisci i rischi
        #location = /decode {
        #    internal;
        #    proxy_pass http://romm_backend/decode;
        #    proxy_set_header Cookie "";
        #    proxy_buffering off;
        #}

        # static files (se l'app ne serve)
        location /static/ {
            proxy_pass http://romm_backend;
        }
    }
}
