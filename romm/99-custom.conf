nginx
# Questo snippet crea un endpoint interno che nginx può chiamare
# per ottenere il payload senza richiedere cookie/CSRF.
# Adattalo se l'app richiede un path diverso.

location = /decode_internal {
    internal;
    proxy_pass http://homeassistant.local:8998/decode_internal;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Non inoltrare cookie per sicurezza
    proxy_set_header Cookie "";
    # Permetti solo subrequests locali
    allow homeassistant.local;
    deny all;
}
