server {
    listen 127.0.0.1:8081;        # porta locale alternativa per evitare conflitti
    server_name localhost;

    location = /decode_internal {
        internal;
        proxy_pass http://127.0.0.1:8998/decode_internal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie "";
        # limitare l'accesso al loopback
        allow 127.0.0.1;
        deny all;
    }
}
